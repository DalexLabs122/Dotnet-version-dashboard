name: Scan .NET Versions

on:
  schedule:
    # 6:00 AM EST = 11:00 UTC
    # Monday through Friday (1-5)
    - cron: '0 11 * * 1-5'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (no commit)'
        required: false
        default: 'false'

jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      search: read
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      
      - name: Create data directory
        run: mkdir -p data
      
      - name: Run .NET version scan
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node .github/scripts/search-dotnet.js
      
      - name: Process results
        run: node .github/scripts/process-results.js
      
      - name: Commit results
        if: github.event.inputs.dry_run != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet data/; then
            echo "No changes to commit"
          else
            git add data/
            git commit -m "chore: update .NET version scan results [skip ci]" || true
            git push
